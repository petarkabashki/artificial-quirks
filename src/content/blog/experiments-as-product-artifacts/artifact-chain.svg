<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430" role="img" aria-labelledby="diagram-title diagram-desc">
<title id="diagram-title">The durable experiment artifact chain</title>
<desc id="diagram-desc">A five-stage schematic from declared experiment through trajectories, case records, scoreboards and reports, to an article evidence bundle.</desc>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
  </marker>
  <style>
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .heading { font-size: 29px; font-weight: 750; fill: #0f172a; }
    .subtitle { font-size: 15px; fill: #475569; }
    .node-title { font-size: 17px; font-weight: 700; }
    .node-body { font-size: 13px; fill: #334155; }
    .edge-label { font-size: 12px; font-weight: 650; fill: #475569; }
    .footer { font-size: 12px; fill: #64748b; }
  </style>
</defs>
<rect width="100%" height="100%" rx="22" fill="#f8fafc"/>
<text x="48" y="48" class="heading">The durable experiment artifact chain</text>
<text x="48" y="76" class="subtitle">Each layer answers a different audit question and preserves the link to the next interpretation.</text>
<path d="M 250 217.5 L 295 217.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 500 217.5 L 545 217.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 750 217.5 L 795 217.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 1000 217.5 L 1045 217.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<g filter="url(#shadow)"><rect x="45" y="145" width="205" height="145" rx="16" fill="#e8f1ff" stroke="#2563eb" stroke-width="2"/></g>
<rect x="45" y="145" width="7" height="145" rx="3.5" fill="#2563eb"/>
<text x="67" y="177" class="node-title" fill="#1e3a8a">Declare</text>
<text x="67" y="199" class="node-body">Task + policy repository</text>
<text x="67" y="217" class="node-body">snapshot arms and repeats</text>
<g filter="url(#shadow)"><rect x="295" y="145" width="205" height="145" rx="16" fill="#f1ebff" stroke="#7c3aed" stroke-width="2"/></g>
<rect x="295" y="145" width="7" height="145" rx="3.5" fill="#7c3aed"/>
<text x="317" y="177" class="node-title" fill="#4c1d95">Run</text>
<text x="317" y="199" class="node-body">Durable IDs events and</text>
<text x="317" y="217" class="node-body">actions model telemetry</text>
<g filter="url(#shadow)"><rect x="545" y="145" width="205" height="145" rx="16" fill="#fff6df" stroke="#d97706" stroke-width="2"/></g>
<rect x="545" y="145" width="7" height="145" rx="3.5" fill="#d97706"/>
<text x="567" y="177" class="node-title" fill="#78350f">Materialize</text>
<text x="567" y="199" class="node-body">Case outcomes failures</text>
<text x="567" y="217" class="node-body">and pending repeat</text>
<text x="567" y="235" class="node-body">records</text>
<g filter="url(#shadow)"><rect x="795" y="145" width="205" height="145" rx="16" fill="#e8f8ef" stroke="#16845b" stroke-width="2"/></g>
<rect x="795" y="145" width="7" height="145" rx="3.5" fill="#16845b"/>
<text x="817" y="177" class="node-title" fill="#14532d">Summarize</text>
<text x="817" y="199" class="node-body">Scoreboard generated</text>
<text x="817" y="217" class="node-body">report mechanism notes</text>
<g filter="url(#shadow)"><rect x="1045" y="145" width="190" height="145" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/></g>
<rect x="1045" y="145" width="7" height="145" rx="3.5" fill="#64748b"/>
<text x="1067" y="177" class="node-title" fill="#1e293b">Publish</text>
<text x="1067" y="199" class="node-body">Article-owned data</text>
<text x="1067" y="217" class="node-body">source hashes</text>
<text x="1067" y="235" class="node-body">regenerable figures</text>
<text x="48" y="406" class="footer">Schematic — raw artifacts remain authoritative; prose is an interpretation layer.</text>
</svg>
