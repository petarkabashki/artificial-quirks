<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="450" viewBox="0 0 1280 450" role="img" aria-labelledby="diagram-title diagram-desc">
<title id="diagram-title">From agent runs to an engineering decision</title>
<desc id="diagram-desc">A four-stage schematic from run artifacts through a multidimensional scorecard and mechanism diagnosis to the next engineering decision.</desc>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
  </marker>
  <style>
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .heading { font-size: 29px; font-weight: 750; fill: #0f172a; }
    .subtitle { font-size: 15px; fill: #475569; }
    .node-title { font-size: 17px; font-weight: 700; }
    .node-body { font-size: 13px; fill: #334155; }
    .edge-label { font-size: 12px; font-weight: 650; fill: #475569; }
    .footer { font-size: 12px; fill: #64748b; }
  </style>
</defs>
<rect width="100%" height="100%" rx="22" fill="#f8fafc"/>
<text x="48" y="48" class="heading">From agent runs to an engineering decision</text>
<text x="48" y="76" class="subtitle">A useful benchmark preserves the mechanism between terminal outcome and policy choice.</text>
<path d="M 285 230 L 345 230" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="273" y="205" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="315" y="220" text-anchor="middle" class="edge-label">normalize</text>
<path d="M 625 230 L 685 230" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="613" y="205" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="655" y="220" text-anchor="middle" class="edge-label">inspect</text>
<path d="M 930 230 L 990 230" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="918" y="205" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="960" y="220" text-anchor="middle" class="edge-label">act</text>
<g filter="url(#shadow)"><rect x="55" y="150" width="230" height="160" rx="16" fill="#e8f1ff" stroke="#2563eb" stroke-width="2"/></g>
<rect x="55" y="150" width="7" height="160" rx="3.5" fill="#2563eb"/>
<text x="77" y="182" class="node-title" fill="#1e3a8a">Run artifacts</text>
<text x="77" y="204" class="node-body">Task and snapshot repeat</text>
<text x="77" y="222" class="node-body">outcomes trajectories and</text>
<text x="77" y="240" class="node-body">IDs</text>
<g filter="url(#shadow)"><rect x="345" y="125" width="280" height="210" rx="16" fill="#f1ebff" stroke="#7c3aed" stroke-width="2"/></g>
<rect x="345" y="125" width="7" height="210" rx="3.5" fill="#7c3aed"/>
<text x="367" y="157" class="node-title" fill="#4c1d95">Six-part scorecard</text>
<text x="367" y="179" class="node-body">Termination + acceptance grounding</text>
<text x="367" y="197" class="node-body">+ repair cost + service health</text>
<g filter="url(#shadow)"><rect x="685" y="150" width="245" height="160" rx="16" fill="#fff6df" stroke="#d97706" stroke-width="2"/></g>
<rect x="685" y="150" width="7" height="160" rx="3.5" fill="#d97706"/>
<text x="707" y="182" class="node-title" fill="#78350f">Mechanism diagnosis</text>
<text x="707" y="204" class="node-body">Separate provider faults from</text>
<text x="707" y="222" class="node-body">invalid plans and failed</text>
<text x="707" y="240" class="node-body">repairs</text>
<g filter="url(#shadow)"><rect x="990" y="150" width="235" height="160" rx="16" fill="#e8f8ef" stroke="#16845b" stroke-width="2"/></g>
<rect x="990" y="150" width="7" height="160" rx="3.5" fill="#16845b"/>
<text x="1012" y="182" class="node-title" fill="#14532d">Next decision</text>
<text x="1012" y="204" class="node-body">Reject, rerun, harden, or</text>
<text x="1012" y="222" class="node-body">promote with an explicit</text>
<text x="1012" y="240" class="node-body">confidence level</text>
<text x="48" y="426" class="footer">Schematic — completion is one input to the scorecard, not the benchmark by itself.</text>
</svg>
