<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title">
  <title id="title">Multi-block batching vs single-cell turns under a step budget</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57606a"/>
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#fafbfc" rx="8"/>

  <text x="380" y="26" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#1f2328">Same short step budget, two cell policies</text>
  <text x="190" y="55" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#0969da">Arm A — multi-block turn</text>
  <rect x="40" y="70" width="300" height="50" rx="8" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5" filter="url(#sh)"/>
  <text x="190.0" y="89.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">1 model call</text>
  <text x="190.0" y="109.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#656d76">5 small cells batched</text>
  <rect x="40" y="140" width="300" height="50" rx="8" fill="#dafbe1" stroke="#1a7f37" stroke-width="1.5" filter="url(#sh)"/>
  <text x="190.0" y="159.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">Task done</text>
  <text x="190.0" y="179.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#656d76">FINAL within budget</text>
  <line x1="190" y1="120" x2="190" y2="140" stroke="#57606a" stroke-width="1.75" marker-end="url(#arrow)"/>
  <text x="190" y="220" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" font-weight="400" fill="#1a7f37">Uses few root steps</text>
  <text x="190" y="240" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="400" fill="#656d76">Higher cells/turn</text>
  <text x="570" y="55" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#8250df">Arm B — prefer 1 cell/turn</text>
  <rect x="430" y="70" width="280" height="30" rx="5" fill="#ffebe9" stroke="#c9d1d9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="570.0" y="85.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">model call → 1 cell  (step 1)</text>
  <rect x="430" y="106" width="280" height="30" rx="5" fill="#fbefff" stroke="#c9d1d9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="570.0" y="121.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">model call → 1 cell  (step 2)</text>
  <rect x="430" y="142" width="280" height="30" rx="5" fill="#fbefff" stroke="#c9d1d9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="570.0" y="157.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">model call → 1 cell  (step 3)</text>
  <rect x="430" y="178" width="280" height="30" rx="5" fill="#fbefff" stroke="#c9d1d9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="570.0" y="193.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">model call → 1 cell  (step 4)</text>
  <rect x="430" y="214" width="280" height="30" rx="5" fill="#fbefff" stroke="#c9d1d9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="570.0" y="229.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">model call → 1 cell  (step 5)</text>
  <text x="570" y="270" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="400" fill="#656d76">… continues to step ceiling</text>
  <rect x="430" y="290" width="280" height="44" rx="8" fill="#ffebe9" stroke="#cf222e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="570.0" y="306.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">No FINAL</text>
  <text x="570.0" y="326.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#656d76">budget exhausted</text>
  <text x="380" y="345" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" font-weight="400" fill="#656d76">Proxy metrics (cells/turn) can improve while the job fails</text>
</svg>
