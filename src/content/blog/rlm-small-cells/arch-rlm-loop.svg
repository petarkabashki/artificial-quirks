<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" role="img" aria-labelledby="title">
  <title id="title">Recursive agent loop</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57606a"/>
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#fafbfc" rx="8"/>

  <text x="360" y="28" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#1f2328">One agent turn (simplified)</text>
  <rect x="40" y="70" width="140" height="64" rx="8" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5" filter="url(#sh)"/>
  <text x="110.0" y="96.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">Model call</text>
  <text x="110.0" y="116.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#656d76">plan + code fences</text>
  <rect x="290" y="70" width="140" height="64" rx="8" fill="#fbefff" stroke="#8250df" stroke-width="1.5" filter="url(#sh)"/>
  <text x="360.0" y="96.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">Code cells</text>
  <text x="360.0" y="116.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#656d76">execute in REPL</text>
  <rect x="540" y="70" width="140" height="64" rx="8" fill="#dafbe1" stroke="#1a7f37" stroke-width="1.5" filter="url(#sh)"/>
  <text x="610.0" y="96.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">Observation</text>
  <text x="610.0" y="116.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#656d76">tools / errors / files</text>
  <rect x="290" y="180" width="140" height="64" rx="8" fill="#fff8c5" stroke="#bf8700" stroke-width="1.5" filter="url(#sh)"/>
  <text x="360.0" y="206.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="600" fill="#1f2328">Budget check</text>
  <text x="360.0" y="226.0" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#656d76">steps · tools · FINAL</text>
  <line x1="180" y1="102" x2="290" y2="102" stroke="#57606a" stroke-width="1.75" marker-end="url(#arrow)"/>
  <line x1="430" y1="102" x2="540" y2="102" stroke="#57606a" stroke-width="1.75" marker-end="url(#arrow)"/>
  <line x1="610" y1="134" x2="430" y2="180" stroke="#57606a" stroke-width="1.75" marker-end="url(#arrow)"/>
  <line x1="290" y1="212" x2="110" y2="212" stroke="#57606a" stroke-width="1.75" marker-end="url(#arrow)"/>
  <line x1="110" y1="212" x2="110" y2="134" stroke="#57606a" stroke-width="1.75" marker-end="url(#arrow)"/>
  <text x="360" y="155" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="400" fill="#656d76">repeat until FINAL or limit</text>
  <text x="360" y="265" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="400" fill="#656d76">“Cell” = one fenced code block executed by the runtime</text>
</svg>
