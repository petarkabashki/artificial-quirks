<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="590" viewBox="0 0 1240 590" role="img" aria-labelledby="diagram-title diagram-desc">
<title id="diagram-title">One bounded repair cycle</title>
<desc id="diagram-desc">A branching flow from plan finalization through validation to acceptance or one targeted repair and a terminal result.</desc>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
  </marker>
  <style>
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .heading { font-size: 29px; font-weight: 750; fill: #0f172a; }
    .subtitle { font-size: 15px; fill: #475569; }
    .node-title { font-size: 17px; font-weight: 700; }
    .node-body { font-size: 13px; fill: #334155; }
    .edge-label { font-size: 12px; font-weight: 650; fill: #475569; }
    .footer { font-size: 12px; fill: #64748b; }
  </style>
</defs>
<rect width="100%" height="100%" rx="22" fill="#f8fafc"/>
<text x="48" y="48" class="heading">One bounded repair cycle</text>
<text x="48" y="76" class="subtitle">Validation feedback permits a single targeted evidence action before the next finalization becomes terminal.</text>
<path d="M 260 240 L 330 240" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 535 240 L 590 240 L 590 168 L 660 167.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="568" y="139" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="610" y="154" text-anchor="middle" class="edge-label">valid</text>
<path d="M 535 240 L 590 240 L 590 382 L 660 382.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="573" y="355" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="615" y="370" text-anchor="middle" class="edge-label">invalid</text>
<path d="M 875 382.5 L 950 382.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="870.5" y="357.5" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="912.5" y="372.5" text-anchor="middle" class="edge-label">one action</text>
<path d="M 1060 315 L 1060 230" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="1018" y="265" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="1060" y="280" text-anchor="middle" class="edge-label">recheck</text>
<g filter="url(#shadow)"><rect x="55" y="175" width="205" height="130" rx="16" fill="#e8f1ff" stroke="#2563eb" stroke-width="2"/></g>
<rect x="55" y="175" width="7" height="130" rx="3.5" fill="#2563eb"/>
<text x="77" y="207" class="node-title" fill="#1e3a8a">Finalize plan</text>
<text x="77" y="229" class="node-body">Submit one structured</text>
<text x="77" y="247" class="node-body">candidate</text>
<g filter="url(#shadow)"><rect x="330" y="175" width="205" height="130" rx="16" fill="#f1ebff" stroke="#7c3aed" stroke-width="2"/></g>
<rect x="330" y="175" width="7" height="130" rx="3.5" fill="#7c3aed"/>
<text x="352" y="207" class="node-title" fill="#4c1d95">Validate</text>
<text x="352" y="229" class="node-body">Scope, evidence, tests,</text>
<text x="352" y="247" class="node-body">plan checks</text>
<g filter="url(#shadow)"><rect x="660" y="105" width="215" height="125" rx="16" fill="#e8f8ef" stroke="#16845b" stroke-width="2"/></g>
<rect x="660" y="105" width="7" height="125" rx="3.5" fill="#16845b"/>
<text x="682" y="137" class="node-title" fill="#14532d">Accept</text>
<text x="682" y="159" class="node-body">Persist verified terminal</text>
<text x="682" y="177" class="node-body">output</text>
<g filter="url(#shadow)"><rect x="660" y="315" width="215" height="135" rx="16" fill="#fff6df" stroke="#d97706" stroke-width="2"/></g>
<rect x="660" y="315" width="7" height="135" rx="3.5" fill="#d97706"/>
<text x="682" y="347" class="node-title" fill="#78350f">Targeted evidence</text>
<text x="682" y="369" class="node-body">Expose the error allow</text>
<text x="682" y="387" class="node-body">exactly one narrow action</text>
<g filter="url(#shadow)"><rect x="950" y="315" width="220" height="135" rx="16" fill="#e8f1ff" stroke="#2563eb" stroke-width="2"/></g>
<rect x="950" y="315" width="7" height="135" rx="3.5" fill="#2563eb"/>
<text x="972" y="347" class="node-title" fill="#1e3a8a">Revised finalization</text>
<text x="972" y="369" class="node-body">Resubmit immediately</text>
<text x="972" y="387" class="node-body">without reopening free</text>
<text x="972" y="405" class="node-body">exploration</text>
<g filter="url(#shadow)"><rect x="950" y="105" width="220" height="125" rx="16" fill="#ffeded" stroke="#dc2626" stroke-width="2"/></g>
<rect x="950" y="105" width="7" height="125" rx="3.5" fill="#dc2626"/>
<text x="972" y="137" class="node-title" fill="#7f1d1d">Terminal result</text>
<text x="972" y="159" class="node-body">Accept if valid otherwise</text>
<text x="972" y="177" class="node-body">stop failed</text>
<text x="48" y="566" class="footer">Schematic — the bound makes cost and failure attributable; it does not guarantee recovery.</text>
</svg>
