<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%" style="background-color: #0f172a; font-family: system-ui, -apple-system, sans-serif;">
  <rect x="20" y="20" width="760" height="360" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="40" y="55" fill="#f8fafc" font-size="20" font-weight="bold">Docker Host Sandbox Security Architecture (Zero Net Access)</text>

  <rect x="50" y="90" width="300" height="260" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="70" y="120" fill="#60a5fa" font-size="16" font-weight="bold">Host Control Plane (orbit-harness)</text>
  
  <rect x="70" y="140" width="260" height="45" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="85" y="167" fill="#e2e8f0" font-size="14">Security Auditor &amp; Audit Log</text>

  <rect x="70" y="200" width="260" height="45" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="85" y="227" fill="#e2e8f0" font-size="14">UDS Bridge (/proxy.sock)</text>

  <rect x="70" y="260" width="260" height="45" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="85" y="287" fill="#e2e8f0" font-size="14">ECDSA Audit Log Signer</text>

  <path d="M 350 222 L 450 222" stroke="#10b981" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="365" y="210" fill="#34d399" font-size="12" font-weight="bold">Unix Domain Socket</text>

  <rect x="450" y="90" width="300" height="260" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
  <text x="470" y="120" fill="#f87171" font-size="16" font-weight="bold">Isolated Docker Sandbox</text>
  <text x="470" y="140" fill="#94a3b8" font-size="12">network_mode: none</text>

  <rect x="470" y="160" width="260" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="485" y="190" fill="#f8fafc" font-size="14">Python REPL Environment</text>

  <rect x="470" y="225" width="260" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="485" y="255" fill="#f8fafc" font-size="14">Scoped write_file() Primitive</text>

  <rect x="470" y="290" width="260" height="40" rx="6" fill="#450a0a" stroke="#991b1b"/>
  <text x="485" y="315" fill="#fca5a5" font-size="13">Blocked: External Network (eth0)</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>
</svg>
