<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="500" viewBox="0 0 1240 500" role="img" aria-labelledby="diagram-title diagram-desc">
<title id="diagram-title">Match the claim to the evidence actually collected</title>
<desc id="diagram-desc">A three-level schematic from cohort outcome through mechanism effect to default policy readiness, with increasing evidence requirements.</desc>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
  </marker>
  <style>
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .heading { font-size: 29px; font-weight: 750; fill: #0f172a; }
    .subtitle { font-size: 15px; fill: #475569; }
    .node-title { font-size: 17px; font-weight: 700; }
    .node-body { font-size: 13px; fill: #334155; }
    .edge-label { font-size: 12px; font-weight: 650; fill: #475569; }
    .footer { font-size: 12px; fill: #64748b; }
  </style>
</defs>
<rect width="100%" height="100%" rx="22" fill="#f8fafc"/>
<text x="48" y="48" class="heading">Match the claim to the evidence actually collected</text>
<text x="48" y="76" class="subtitle">A small successful cohort can support a local observation before it supports a mechanism or a default.</text>
<path d="M 380 312.5 L 475 262.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="385.5" y="262.5" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="427.5" y="277.5" text-anchor="middle" class="edge-label">direct coverage</text>
<path d="M 765 262.5 L 860 202.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="770.5" y="207.5" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="812.5" y="222.5" text-anchor="middle" class="edge-label">replication</text>
<g filter="url(#shadow)"><rect x="90" y="235" width="290" height="155" rx="16" fill="#e8f1ff" stroke="#2563eb" stroke-width="2"/></g>
<rect x="90" y="235" width="7" height="155" rx="3.5" fill="#2563eb"/>
<text x="112" y="267" class="node-title" fill="#1e3a8a">1. Cohort outcome</text>
<text x="112" y="289" class="node-body">Observed repeats completed under</text>
<text x="112" y="307" class="node-body">one recorded configuration</text>
<g filter="url(#shadow)"><rect x="475" y="175" width="290" height="175" rx="16" fill="#f1ebff" stroke="#7c3aed" stroke-width="2"/></g>
<rect x="475" y="175" width="7" height="175" rx="3.5" fill="#7c3aed"/>
<text x="497" y="207" class="node-title" fill="#4c1d95">2. Mechanism effect</text>
<text x="497" y="229" class="node-body">Target branch exercised against a</text>
<text x="497" y="247" class="node-body">relevant control with confounders</text>
<text x="497" y="265" class="node-body">bounded</text>
<g filter="url(#shadow)"><rect x="860" y="105" width="290" height="195" rx="16" fill="#e8f8ef" stroke="#16845b" stroke-width="2"/></g>
<rect x="860" y="105" width="7" height="195" rx="3.5" fill="#16845b"/>
<text x="882" y="137" class="node-title" fill="#14532d">3. Default readiness</text>
<text x="882" y="159" class="node-body">Replicated across tasks, repeats,</text>
<text x="882" y="177" class="node-body">costs, and important failure modes</text>
<text x="48" y="476" class="footer">Schematic — move upward only when the additional evidence requirement is satisfied.</text>
</svg>
