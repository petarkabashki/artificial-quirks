<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="450" viewBox="0 0 1280 450" role="img" aria-labelledby="diagram-title diagram-desc">
<title id="diagram-title">Grounding strength is a ladder, not a checkbox</title>
<desc id="diagram-desc">A five-step evidence ladder from path existence through scope and source checks to related tests and claim-to-branch review.</desc>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
  </marker>
  <style>
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .heading { font-size: 29px; font-weight: 750; fill: #0f172a; }
    .subtitle { font-size: 15px; fill: #475569; }
    .node-title { font-size: 17px; font-weight: 700; }
    .node-body { font-size: 13px; fill: #334155; }
    .edge-label { font-size: 12px; font-weight: 650; fill: #475569; }
    .footer { font-size: 12px; fill: #64748b; }
  </style>
</defs>
<rect width="100%" height="100%" rx="22" fill="#f8fafc"/>
<text x="48" y="48" class="heading">Grounding strength is a ladder, not a checkbox</text>
<text x="48" y="76" class="subtitle">Every step rejects another failure class, while only the final checks engage the claim itself.</text>
<path d="M 250 242.5 L 295 232.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 500 232.5 L 545 222.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 750 222.5 L 795 212.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 1000 212.5 L 1045 202.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<g filter="url(#shadow)"><rect x="45" y="175" width="205" height="135" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/></g>
<rect x="45" y="175" width="7" height="135" rx="3.5" fill="#64748b"/>
<text x="67" y="207" class="node-title" fill="#1e293b">Path exists</text>
<text x="67" y="229" class="node-body">Reject invented filenames</text>
<g filter="url(#shadow)"><rect x="295" y="155" width="205" height="155" rx="16" fill="#e8f1ff" stroke="#2563eb" stroke-width="2"/></g>
<rect x="295" y="155" width="7" height="155" rx="3.5" fill="#2563eb"/>
<text x="317" y="187" class="node-title" fill="#1e3a8a">Inside scope</text>
<text x="317" y="209" class="node-body">Reject neighboring or</text>
<text x="317" y="227" class="node-body">unrelated components</text>
<g filter="url(#shadow)"><rect x="545" y="135" width="205" height="175" rx="16" fill="#f1ebff" stroke="#7c3aed" stroke-width="2"/></g>
<rect x="545" y="135" width="7" height="175" rx="3.5" fill="#7c3aed"/>
<text x="567" y="167" class="node-title" fill="#4c1d95">Source matches</text>
<text x="567" y="189" class="node-body">Separate docs,</text>
<text x="567" y="207" class="node-body">configuration, tests, and</text>
<text x="567" y="225" class="node-body">implementation</text>
<g filter="url(#shadow)"><rect x="795" y="115" width="205" height="195" rx="16" fill="#fff6df" stroke="#d97706" stroke-width="2"/></g>
<rect x="795" y="115" width="7" height="195" rx="3.5" fill="#d97706"/>
<text x="817" y="147" class="node-title" fill="#78350f">Test is related</text>
<text x="817" y="169" class="node-body">Confirm a real test</text>
<text x="817" y="187" class="node-body">exercises the cited</text>
<text x="817" y="205" class="node-body">behavior</text>
<g filter="url(#shadow)"><rect x="1045" y="95" width="190" height="215" rx="16" fill="#e8f8ef" stroke="#16845b" stroke-width="2"/></g>
<rect x="1045" y="95" width="7" height="215" rx="3.5" fill="#16845b"/>
<text x="1067" y="127" class="node-title" fill="#14532d">Claim matches</text>
<text x="1067" y="148" class="node-title" fill="#14532d">branch</text>
<text x="1067" y="171" class="node-body">Check states,</text>
<text x="1067" y="189" class="node-body">conditions, and</text>
<text x="1067" y="207" class="node-body">contradictions</text>
<text x="48" y="426" class="footer">Schematic — semantic strength increases from left to right; cost usually increases with it.</text>
</svg>
