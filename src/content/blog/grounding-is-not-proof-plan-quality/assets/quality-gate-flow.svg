<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%" style="background-color: #0f172a; font-family: system-ui, -apple-system, sans-serif;">
  <rect x="20" y="20" width="760" height="360" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="40" y="55" fill="#f8fafc" font-size="20" font-weight="bold">Pre-Finalization Grounding &amp; Quality Intercept Flow</text>

  <rect x="50" y="100" width="180" height="120" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="70" y="130" fill="#60a5fa" font-size="15" font-weight="bold">1. RLM Turn Loop</text>
  <text x="70" y="155" fill="#e2e8f0" font-size="13">Executes REPL code</text>
  <text x="70" y="180" fill="#e2e8f0" font-size="13">Emits FINAL(answer)</text>

  <path d="M 230 160 L 300 160" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow-slate)"/>

  <rect x="300" y="100" width="200" height="120" rx="8" fill="#0f172a" stroke="#eab308" stroke-width="2"/>
  <text x="320" y="130" fill="#fde047" font-size="15" font-weight="bold">2. Quality Intercept</text>
  <text x="320" y="155" fill="#e2e8f0" font-size="13">check_grounding(text)</text>
  <text x="320" y="180" fill="#e2e8f0" font-size="13">Extract cited paths</text>

  <path d="M 400 220 L 400 310 L 140 310 L 140 220" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="6,6" marker-end="url(#arrow-red)"/>
  <rect x="200" y="290" width="160" height="35" rx="6" fill="#450a0a" stroke="#991b1b"/>
  <text x="210" y="313" fill="#fca5a5" font-size="12" font-weight="bold">Unverified Paths -&gt; Retry</text>

  <path d="M 500 160 L 570 160" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-green)"/>

  <rect x="570" y="100" width="180" height="120" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="2"/>
  <text x="590" y="130" fill="#34d399" font-size="15" font-weight="bold">3. Converged State</text>
  <text x="590" y="155" fill="#e2e8f0" font-size="13">100% Path Grounded</text>
  <text x="590" y="180" fill="#e2e8f0" font-size="13">Quality Gate: PASSED</text>

  <defs>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
