<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="440" viewBox="0 0 1220 440" role="img" aria-labelledby="diagram-title diagram-desc">
<title id="diagram-title">Three cumulative gates for plan readiness</title>
<desc id="diagram-desc">A schematic showing structural validity, reference grounding, semantic readiness, and implementation readiness as cumulative gates.</desc>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
  </marker>
  <style>
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .heading { font-size: 29px; font-weight: 750; fill: #0f172a; }
    .subtitle { font-size: 15px; fill: #475569; }
    .node-title { font-size: 17px; font-weight: 700; }
    .node-body { font-size: 13px; fill: #334155; }
    .edge-label { font-size: 12px; font-weight: 650; fill: #475569; }
    .footer { font-size: 12px; fill: #64748b; }
  </style>
</defs>
<rect width="100%" height="100%" rx="22" fill="#f8fafc"/>
<text x="48" y="48" class="heading">Three cumulative gates for plan readiness</text>
<text x="48" y="76" class="subtitle">Mechanical acceptance narrows risk; it does not establish that the plan describes the system correctly.</text>
<path d="M 235 222.5 L 285 222.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<path d="M 495 222.5 L 545 222.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="478" y="197.5" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="520" y="212.5" text-anchor="middle" class="edge-label">pass</text>
<path d="M 755 222.5 L 805 222.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="738" y="197.5" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="780" y="212.5" text-anchor="middle" class="edge-label">pass</text>
<path d="M 1015 222.5 L 1065 222.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="998" y="197.5" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="1040" y="212.5" text-anchor="middle" class="edge-label">pass</text>
<g filter="url(#shadow)"><rect x="45" y="150" width="190" height="145" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/></g>
<rect x="45" y="150" width="7" height="145" rx="3.5" fill="#64748b"/>
<text x="67" y="182" class="node-title" fill="#1e293b">Candidate plan</text>
<text x="67" y="204" class="node-body">Scope, evidence, tests,</text>
<text x="67" y="222" class="node-body">expected outputs</text>
<g filter="url(#shadow)"><rect x="285" y="150" width="210" height="145" rx="16" fill="#e8f1ff" stroke="#2563eb" stroke-width="2"/></g>
<rect x="285" y="150" width="7" height="145" rx="3.5" fill="#2563eb"/>
<text x="307" y="182" class="node-title" fill="#1e3a8a">1. Structural</text>
<text x="307" y="204" class="node-body">Required fields schema</text>
<text x="307" y="222" class="node-body">and routing bounded</text>
<text x="307" y="240" class="node-body">repair</text>
<g filter="url(#shadow)"><rect x="545" y="150" width="210" height="145" rx="16" fill="#f1ebff" stroke="#7c3aed" stroke-width="2"/></g>
<rect x="545" y="150" width="7" height="145" rx="3.5" fill="#7c3aed"/>
<text x="567" y="182" class="node-title" fill="#4c1d95">2. Grounding</text>
<text x="567" y="204" class="node-body">Paths exist inside scope</text>
<text x="567" y="222" class="node-body">references resolve</text>
<g filter="url(#shadow)"><rect x="805" y="150" width="210" height="145" rx="16" fill="#fff6df" stroke="#d97706" stroke-width="2"/></g>
<rect x="805" y="150" width="7" height="145" rx="3.5" fill="#d97706"/>
<text x="827" y="182" class="node-title" fill="#78350f">3. Semantic</text>
<text x="827" y="204" class="node-body">Claims match code tests</text>
<text x="827" y="222" class="node-body">exercise claims branches</text>
<text x="827" y="240" class="node-body">are accurate</text>
<g filter="url(#shadow)"><rect x="1065" y="150" width="115" height="145" rx="16" fill="#e8f8ef" stroke="#16845b" stroke-width="2"/></g>
<rect x="1065" y="150" width="7" height="145" rx="3.5" fill="#16845b"/>
<text x="1087" y="182" class="node-title" fill="#14532d">Ready</text>
<text x="1087" y="204" class="node-body">Safe to review as</text>
<text x="1087" y="222" class="node-body">a contract</text>
<text x="48" y="416" class="footer">Schematic — passing a gate unlocks the next review; no gate substitutes for the ones before it.</text>
</svg>
