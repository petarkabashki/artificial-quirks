<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430" role="img" aria-labelledby="diagram-title diagram-desc">
<title id="diagram-title">The agent harness as a control plane</title>
<desc id="diagram-desc">A five-stage schematic from declared task and policy through isolated execution, output, verification, and human-approved application.</desc>
<defs>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
  </marker>
  <style>
    text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .heading { font-size: 29px; font-weight: 750; fill: #0f172a; }
    .subtitle { font-size: 15px; fill: #475569; }
    .node-title { font-size: 17px; font-weight: 700; }
    .node-body { font-size: 13px; fill: #334155; }
    .edge-label { font-size: 12px; font-weight: 650; fill: #475569; }
    .footer { font-size: 12px; fill: #64748b; }
  </style>
</defs>
<rect width="100%" height="100%" rx="22" fill="#f8fafc"/>
<text x="48" y="48" class="heading">The agent harness as a control plane</text>
<text x="48" y="76" class="subtitle">Authority, evidence, and state move through explicit boundaries rather than one opaque run.</text>
<path d="M 250 217.5 L 295 217.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="230.5" y="192.5" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="272.5" y="207.5" text-anchor="middle" class="edge-label">constrain</text>
<path d="M 500 217.5 L 545 217.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="480.5" y="192.5" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="522.5" y="207.5" text-anchor="middle" class="edge-label">produce</text>
<path d="M 750 217.5 L 795 217.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="730.5" y="192.5" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="772.5" y="207.5" text-anchor="middle" class="edge-label">check</text>
<path d="M 1000 217.5 L 1045 217.5" fill="none" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"/>
<rect x="980.5" y="192.5" width="84" height="22" rx="11" fill="#f8fafc"/>
<text x="1022.5" y="207.5" text-anchor="middle" class="edge-label">decide</text>
<g filter="url(#shadow)"><rect x="45" y="145" width="205" height="145" rx="16" fill="#e8f1ff" stroke="#2563eb" stroke-width="2"/></g>
<rect x="45" y="145" width="7" height="145" rx="3.5" fill="#2563eb"/>
<text x="67" y="177" class="node-title" fill="#1e3a8a">Task + policy</text>
<text x="67" y="199" class="node-body">Repository snapshot</text>
<text x="67" y="217" class="node-body">allowed actions budgets</text>
<text x="67" y="235" class="node-body">and secrets</text>
<g filter="url(#shadow)"><rect x="295" y="145" width="205" height="145" rx="16" fill="#f1ebff" stroke="#7c3aed" stroke-width="2"/></g>
<rect x="295" y="145" width="7" height="145" rx="3.5" fill="#7c3aed"/>
<text x="317" y="177" class="node-title" fill="#4c1d95">Isolated run</text>
<text x="317" y="199" class="node-body">Worktree boundary</text>
<text x="317" y="217" class="node-body">restricted environment</text>
<text x="317" y="235" class="node-body">durable trajectory</text>
<g filter="url(#shadow)"><rect x="545" y="145" width="205" height="145" rx="16" fill="#fff6df" stroke="#d97706" stroke-width="2"/></g>
<rect x="545" y="145" width="7" height="145" rx="3.5" fill="#d97706"/>
<text x="567" y="177" class="node-title" fill="#78350f">Plan or patch</text>
<text x="567" y="199" class="node-body">Structured output claimed</text>
<text x="567" y="217" class="node-body">evidence changed files</text>
<g filter="url(#shadow)"><rect x="795" y="145" width="205" height="145" rx="16" fill="#e8f8ef" stroke="#16845b" stroke-width="2"/></g>
<rect x="795" y="145" width="7" height="145" rx="3.5" fill="#16845b"/>
<text x="817" y="177" class="node-title" fill="#14532d">Verification</text>
<text x="817" y="199" class="node-body">Tests and policy</text>
<text x="817" y="217" class="node-body">grounding checks review</text>
<text x="817" y="235" class="node-body">evidence</text>
<g filter="url(#shadow)"><rect x="1045" y="145" width="190" height="145" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/></g>
<rect x="1045" y="145" width="7" height="145" rx="3.5" fill="#64748b"/>
<text x="1067" y="177" class="node-title" fill="#1e293b">Human apply</text>
<text x="1067" y="199" class="node-body">Inspect consequences</text>
<text x="1067" y="217" class="node-body">approve or reject</text>
<text x="1067" y="235" class="node-body">retain authority</text>
<text x="48" y="406" class="footer">Schematic — stages describe the operating model, not measured timing or throughput.</text>
</svg>
